version: v1.0
name: Only run on `production` branch
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: 'Block #1'
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - echo $SEMAPHORE_GIT_BRANCH
            - checkout
            - git fetch --unshallow
            - 'git config remote.origin.fetch ''+refs/heads/*:refs/remotes/origin/*'''
            - git fetch --all
            - git branch -a
            - git checkout production
            - git pull
