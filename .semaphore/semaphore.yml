version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: 'Block #1'
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - checkout
            - echo $SEMAPHORE_GIT_BRANCH
promotions:
  - name: 'Deploy to target: `production` '
    pipeline_file: pipeline_2.yml
    deployment_target: production
    auto_promote:
      when: result = 'passed'
