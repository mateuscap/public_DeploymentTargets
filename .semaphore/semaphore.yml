version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: 'Block #1'
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - echo $SEMAPHORE_GIT_BRANCH
            - echo "success"
            - checkout
            - '#git fetch --unshallow'
            - 'git config remote.origin.fetch ''+refs/heads/*:refs/remotes/origin/*'''
            - git fetch --all
            - git branch -a
            - git checkout production
            - git pull
promotions:
  - name: 'Deploy to target: `production` '
    pipeline_file: pipeline_2.yml
    deployment_target: production
    auto_promote:
      when: result = 'passed'
